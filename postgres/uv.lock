version = "0.1.0"
source = { virtual = "." }
dependencies = [
    { name = "numpy", version = "2.2.6", source = { registry = "https://pypi.org/simple" }, marker = "python_full_version < '3.11'" },
    { name = "numpy", version = "2.4.4", source = { registry = "https://pypi.org/simple" }, marker = "python_full_version >= '3.11'" },
    { name = "pandas", version = "2.3.3", source = { registry = "https://pypi.org/simple" }, marker = "python_full_version < '3.11'" },
    { name = "pandas", version = "3.0.3", source = { registry = "https://pypi.org/simple" }, marker = "python_full_version >= '3.11'" },
    { name = "pgvector" },
    { name = "psycopg", extra = ["binary"] },
    { name = "pyarrow" },
    { name = "tqdm" },
]

[package.dev-dependencies]
dev = [
    { name = "ruff" },
]

[package.metadata]
requires-dist = [
    { name = "numpy", specifier = ">=1.26" },
    { name = "pandas", specifier = ">=2.0" },
    { name = "pgvector", specifier = ">=0.3" },
    { name = "psycopg", extras = ["binary"], specifier = ">=3.1" },
    { name = "pyarrow", specifier = ">=17.0" },
    { name = "tqdm", specifier = ">=4.66" },
]

[package.metadata.requires-dev]
dev = [{ name = "ruff", specifier = ">=0.15.10" }]
