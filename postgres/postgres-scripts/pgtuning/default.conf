# Postgres tuning for default
# TODO: fill in actual core count and RAM for this machine
# Use pgtune (https://pgtune.leopard.in.ua/) with DB type: DW

shared_buffers = 30GB           # TODO: ~1/4 of RAM
effective_cache_size = 60GB     # TODO: ~1/2 of RAM
maintenance_work_mem = 30GB     # TODO: adjust
work_mem = 1GB
max_connections = 40

# Parallelism — TODO: set to actual core count
max_worker_processes = 19
max_parallel_workers = 18
max_parallel_workers_per_gather = 18
max_parallel_maintenance_workers = 18

# pgvector best practices
jit = off
shared_preload_libraries = 'pg_prewarm'

# WAL / checkpoint
wal_compression = zstd
wal_buffers = 16MB
min_wal_size = 4GB
max_wal_size = 16GB
checkpoint_completion_target = 0.9

# I/O
random_page_cost = 1.1
effective_io_concurrency = 200

# Stats
default_statistics_target = 500
