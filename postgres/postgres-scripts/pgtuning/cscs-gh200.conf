# Postgres tuning for CSCS daint GH200 Grace CPU
# 72 cores per NUMA node, ~480 GB RAM per NUMA node
# Generated via pgtune (DB type: DW) + pgvector best practices

shared_buffers = 120GB
effective_cache_size = 360GB
maintenance_work_mem = 64GB
work_mem = 1GB
max_connections = 40

# Parallelism — use all 72 cores
max_worker_processes = 72
max_parallel_workers = 71
max_parallel_workers_per_gather = 71
max_parallel_maintenance_workers = 71

# pgvector: JIT off, prewarm for buffer cache warming
jit = off
shared_preload_libraries = 'pg_prewarm'

# WAL / checkpoint
wal_compression = zstd
wal_buffers = 16MB
min_wal_size = 4GB
max_wal_size = 16GB
checkpoint_completion_target = 0.9

# I/O
random_page_cost = 1.1
effective_io_concurrency = 200

# Stats
default_statistics_target = 500
